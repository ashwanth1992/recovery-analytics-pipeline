<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceOrg · Vintage Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ── DESIGN TOKENS ─────────────────────────────────────────────── */
:root {
  --bg:             #F2F4FF;
  --card-bg:        rgba(255,255,255,0.78);
  --card-bg-hover:  rgba(255,255,255,0.96);
  --card-bg-active: rgba(255,255,255,0.96);
  --card-blur:      16px;
  --card-border:    rgba(255,255,255,0.82);
  --card-border2:   rgba(15,23,42,0.1);
  --tbl-head-bg:    rgba(15,23,42,0.03);
  --surface:        #FFFFFF;

  --text:   #0F172A;
  --text2:  #475569;
  --text3:  #94A3B8;

  --orb-a-col: rgba(37,99,235,.12);
  --orb-b-col: rgba(124,58,237,.09);
  --orb-c-col: rgba(13,148,136,.07);

  --green:  #16A34A; --green-light:  rgba(22,163,74,.12);  --green-border:  rgba(22,163,74,.3);
  --amber:  #D97706; --amber-light:  rgba(217,119,6,.12);  --amber-border:  rgba(217,119,6,.3);
  --red:    #DC2626; --red-light:    rgba(220,38,38,.12);  --red-border:    rgba(220,38,38,.3);
  --blue:   #2563EB; --blue-light:   rgba(37,99,235,.12);  --blue-border:   rgba(37,99,235,.3);
  --purple: #7C3AED; --purple-light: rgba(124,58,237,.12); --purple-border: rgba(124,58,237,.3);
  --indigo: #4338CA; --indigo-light: rgba(67,56,202,.12);  --indigo-border: rgba(67,56,202,.3);
  --rose:   #E11D48; --rose-light:   rgba(225,29,72,.12);  --rose-border:   rgba(225,29,72,.3);

  --font:   'Inter', sans-serif;
  --mono:   'JetBrains Mono', monospace;
  --radius: 16px; --radius-sm: 10px; --radius-xs: 7px;

  --shadow:    0 2px 12px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.04);
  --shadow-md: 0 4px 20px rgba(15,23,42,.08);
  --shadow-lg: 0 16px 40px rgba(15,23,42,.12);
  --inset:     inset 0 1px 0 rgba(255,255,255,0.9);
}

[data-theme="dark"] {
  --bg:             #060612;
  --card-bg:        rgba(255,255,255,0.04);
  --card-bg-hover:  rgba(255,255,255,0.07);
  --card-bg-active: rgba(255,255,255,0.1);
  --card-blur:      20px;
  --card-border:    rgba(255,255,255,0.08);
  --card-border2:   rgba(255,255,255,0.12);
  --tbl-head-bg:    rgba(0,0,0,0.25);
  --surface:        #0F172A;

  --text:   #F1F5F9;
  --text2:  #94A3B8;
  --text3:  #475569;

  --orb-a-col: rgba(37,99,235,.22);
  --orb-b-col: rgba(124,58,237,.18);
  --orb-c-col: rgba(13,148,136,.14);

  --green:  #4ADE80; --green-light:  rgba(74,222,128,.12);  --green-border:  rgba(74,222,128,.3);
  --amber:  #FCD34D; --amber-light:  rgba(252,211,77,.12);  --amber-border:  rgba(252,211,77,.3);
  --red:    #F87171; --red-light:    rgba(248,113,113,.12); --red-border:    rgba(248,113,113,.3);
  --blue:   #60A5FA; --blue-light:   rgba(96,165,250,.12);  --blue-border:   rgba(96,165,250,.3);
  --purple: #A78BFA; --purple-light: rgba(167,139,250,.12); --purple-border: rgba(167,139,250,.3);
  --indigo: #818CF8; --indigo-light: rgba(129,140,248,.12); --indigo-border: rgba(129,140,248,.3);
  --rose:   #FB7185; --rose-light:   rgba(251,113,133,.12); --rose-border:   rgba(251,113,133,.3);

  --shadow:    0 1px 4px rgba(0,0,0,.5);
  --shadow-md: 0 4px 14px rgba(0,0,0,.6);
  --shadow-lg: 0 16px 40px rgba(0,0,0,.75);
  --inset:     inset 0 1px 0 rgba(255,255,255,0.06);
}

/* ── RESET ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  min-height: 100vh; line-height: 1.5;
  transition: background .3s, color .3s;
  -webkit-font-smoothing: antialiased;
}
button { font-family: var(--font); cursor: pointer; border: none; background: none; }
button:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

/* ── UTILITY ─────────────────────────────────────────────────────── */
.hidden { display: none !important; }
.translate-x-full { transform: translateX(100%) !important; }

/* ── BACKGROUND ORBS ─────────────────────────────────────────────── */
.orbs {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.orb { position: absolute; border-radius: 50%; filter: blur(90px); will-change: transform; }
.orb-a {
  width: 750px; height: 750px; top: -300px; left: -200px;
  background: radial-gradient(circle, var(--orb-a-col) 0%, transparent 70%);
  animation: orbDrift 32s ease-in-out infinite;
}
.orb-b {
  width: 620px; height: 620px; bottom: -180px; right: -120px;
  background: radial-gradient(circle, var(--orb-b-col) 0%, transparent 70%);
  animation: orbDrift 40s ease-in-out infinite reverse;
}
.orb-c {
  width: 480px; height: 480px; top: 40%; right: 20%;
  background: radial-gradient(circle, var(--orb-c-col) 0%, transparent 70%);
  animation: orbDrift 26s ease-in-out infinite 6s;
}
@keyframes orbDrift {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(45px,-55px) scale(1.07); }
  66%      { transform: translate(-35px,40px) scale(.93); }
}

/* ── SHELL ─────────────────────────────────────────────────────── */
.shell { max-width: 1340px; margin: 0 auto; padding: 24px 24px 72px; position: relative; z-index: 1; }

/* ── HEADER ─────────────────────────────────────────────────────── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
  background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(37,99,235,.3), 0 0 40px rgba(37,99,235,.1), var(--inset);
}
[data-theme="light"] .brand-mark { box-shadow: 0 2px 10px rgba(37,99,235,.25); }
.brand-icon { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.brand-title { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -.04em; }
.brand-sub    { font-size: 11px; color: var(--text3); font-weight: 500; margin-top: 1px; font-family: var(--mono); }

/* Controls pill */
.controls-pill {
  display: flex; align-items: center; gap: 2px;
  background: var(--card-bg);
  backdrop-filter: blur(var(--card-blur));
  -webkit-backdrop-filter: blur(var(--card-blur));
  border: 1px solid var(--card-border);
  border-radius: 12px; padding: 5px 8px;
  box-shadow: var(--shadow), var(--inset);
}
.ctrl-select {
  background: transparent; border: none; outline: none;
  font-family: var(--font); font-size: 12px; font-weight: 600;
  color: var(--text2); cursor: pointer;
  padding: 5px 10px; border-radius: var(--radius-xs);
  transition: background .15s, color .15s;
}
.ctrl-select:hover { background: var(--card-bg-hover); color: var(--text); }
.ctrl-divider { width: 1px; height: 18px; background: var(--card-border2); margin: 0 2px; flex-shrink: 0; }
.theme-btn {
  width: 32px; height: 32px; border-radius: var(--radius-xs);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: background .15s; color: var(--text2);
}
.theme-btn:hover { background: var(--card-bg-hover); }

/* ── LOADER ──────────────────────────────────────────────────────── */
.page-loader {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 55vh; gap: 14px;
}
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2.5px solid var(--card-border2);
  border-top-color: var(--blue);
  animation: spin .75s linear infinite;
  box-shadow: 0 0 16px rgba(37,99,235,.2);
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 12px; color: var(--text3); font-family: var(--mono); letter-spacing: .02em; }

/* ── GLASS CARD BASE ─────────────────────────────────────────────── */
.glass-card {
  background: var(--card-bg);
  backdrop-filter: blur(var(--card-blur));
  -webkit-backdrop-filter: blur(var(--card-blur));
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  box-shadow: var(--shadow), var(--inset);
  position: relative; overflow: hidden;
  transition: background .2s, box-shadow .2s;
}

/* ── KPI GRID ────────────────────────────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 12px; }
.kpi-card {
  padding: 20px 22px;
  transition: transform .2s, box-shadow .2s;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md), var(--inset); }
.kcard-accent {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  border-radius: var(--radius) var(--radius) 0 0;
}
.kcard-label {
  font-size: 10px; font-weight: 700; letter-spacing: .09em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 4px;
}
.kcard-val {
  font-size: 28px; font-weight: 800; color: var(--text);
  letter-spacing: -.05em; line-height: 1.1; margin-top: 8px;
}

/* ── HEATMAP CARD ────────────────────────────────────────────────── */
.hm-card { overflow: hidden; }
.hm-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--card-border2);
  background: var(--tbl-head-bg); gap: 12px; flex-wrap: wrap;
}
.hm-title { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }

/* Metric selector */
.metric-selector {
  display: flex; gap: 2px;
  background: var(--card-bg);
  backdrop-filter: blur(var(--card-blur));
  -webkit-backdrop-filter: blur(var(--card-blur));
  border: 1px solid var(--card-border2);
  border-radius: var(--radius-xs); padding: 3px;
}
.metric-btn {
  padding: 5px 12px; border-radius: 5px; font-size: 11px; font-weight: 600;
  color: var(--text3); cursor: pointer; transition: all .15s; background: none; border: none;
  font-family: var(--font);
}
.metric-btn:hover { color: var(--text2); background: var(--card-bg-hover); }
.metric-btn.active {
  background: var(--card-bg-active); color: var(--text);
  box-shadow: 0 1px 3px rgba(0,0,0,.08), var(--inset);
}

/* Heatmap scroll + table */
.hm-scroll { padding: 20px; overflow-x: auto; }
.hm-table { width: 100%; border-collapse: separate; border-spacing: 3px; }
.hm-th {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--text3);
  padding: 10px 10px; text-align: right;
  border-bottom: 1px solid var(--card-border2); white-space: nowrap;
}
.hm-th-left { text-align: left; }
.hm-th-total { color: var(--text2); }
.hm-row-label {
  font-family: var(--font); font-size: 12px; font-weight: 500;
  color: var(--text2); padding: 9px 10px; white-space: nowrap;
}
.hm-row-label.is-total { font-weight: 700; color: var(--text); }
.hm-cell {
  height: 42px; padding: 0 10px; font-size: 12px; font-weight: 600;
  font-family: var(--font); font-variant-numeric: tabular-nums;
  text-align: right; border-radius: 5px; cursor: pointer;
  transition: transform .1s, filter .1s;
  white-space: nowrap;
}
.hm-cell:hover { transform: scale(1.04); filter: brightness(1.08); z-index: 10; position: relative; }

/* ── OVERLAY ─────────────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; z-index: 40;
  background: rgba(0,0,0,.45); backdrop-filter: blur(4px);
  transition: opacity .2s;
}

/* ── DRAWER ──────────────────────────────────────────────────────── */
.drawer {
  position: fixed; inset-y: 0; right: 0; width: 100%; max-width: 600px;
  background: var(--card-bg);
  backdrop-filter: blur(var(--card-blur));
  -webkit-backdrop-filter: blur(var(--card-blur));
  border-left: 1px solid var(--card-border);
  z-index: 50; display: flex; flex-direction: column;
  box-shadow: -8px 0 32px rgba(0,0,0,.15);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"] .drawer { background: rgba(255,255,255,0.92); }
.drawer-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 20px 24px; border-bottom: 1px solid var(--card-border2);
  background: var(--tbl-head-bg); gap: 12px; flex-shrink: 0;
}
.drawer-title { font-size: 15px; font-weight: 800; color: var(--text); letter-spacing: -.03em; }
.drawer-sub   { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: var(--mono); }
.drawer-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.btn-csv {
  padding: 6px 12px; border-radius: var(--radius-xs);
  background: var(--text); color: var(--bg);
  font-size: 11px; font-weight: 700; font-family: var(--font);
  transition: opacity .15s; border: none; cursor: pointer;
}
.btn-csv:hover { opacity: .85; }
.btn-close {
  width: 32px; height: 32px; border-radius: var(--radius-xs);
  display: flex; align-items: center; justify-content: center;
  color: var(--text3); font-size: 14px;
  transition: background .15s, color .15s;
}
.btn-close:hover { background: var(--card-bg-hover); color: var(--text); }
.drawer-body { flex: 1; overflow-y: auto; background: transparent; }

/* ── DRILLDOWN LOADING ANIMATION ─────────────────────────────────── */
@keyframes dlPing   { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(2.6);opacity:0} }
@keyframes dlPulse  { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes dlProgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── DRILLDOWN TABLE ─────────────────────────────────────────────── */
.dl-table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
.dl-thead { position: sticky; top: 0; z-index: 1; }
.dl-th {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
  color: var(--text3); padding: 10px 14px;
  background: var(--tbl-head-bg);
  border-bottom: 1px solid var(--card-border2);
}
.dl-th-r { text-align: right; }
.dl-tr { transition: background .1s; }
.dl-tr:hover .dl-td { background: var(--card-bg-hover); }
.dl-td { padding: 10px 14px; border-bottom: 1px solid var(--card-border2); }
.dl-tr:last-child .dl-td { border-bottom: none; }
.dl-lead-id { font-family: var(--font); font-weight: 600; color: var(--indigo); font-variant-numeric: tabular-nums; }
.dl-type     { color: var(--text3); font-size: 12px; }
.dl-accrued  { text-align: right; color: var(--text2); font-family: var(--font); font-size: 12px; font-variant-numeric: tabular-nums; }
.dl-paid     { text-align: right; color: var(--green); font-family: var(--font); font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
.dl-rem      { text-align: right; color: var(--rose);  font-family: var(--font); font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* ── TOAST ───────────────────────────────────────────────────────── */
.toast-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
.toast {
  padding: 10px 15px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
  border: 1px solid; box-shadow: var(--shadow-lg); max-width: 300px;
  animation: toastIn .2s cubic-bezier(.175,.885,.32,1.275);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  background: var(--card-bg);
}
@keyframes toastIn { from{opacity:0;transform:translateY(10px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }

/* ── RESPONSIVE ──────────────────────────────────────────────────── */
@media (max-width: 960px) { .kpi-grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 560px) {
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .controls-pill { flex-wrap: wrap; border-radius: var(--radius); }
  .page-header { flex-direction: column; align-items: flex-start; }
}
  </style>
</head>
<body>

<!-- Background orbs -->
<div class="orbs" aria-hidden="true">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>
</div>

<div class="shell">

  <!-- HEADER -->
  <div class="page-header">
    <div class="brand">
      <div class="brand-mark">
        <svg class="brand-icon" viewBox="0 0 24 24">
          <path d="M3 3h18v4H3zM3 10h12v4H3zM3 17h8v4H3z"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">Vintage Analysis</div>
        <div class="brand-sub" id="header-date">Fetching data...</div>
      </div>
    </div>

    <div class="controls-pill">
      <select id="sel-view" class="ctrl-select" onchange="updateUI()">
        <option value="View 2">LMS Logic</option>
        <option value="View 3">FIFO Logic</option>
      </select>
      <div class="ctrl-divider"></div>
      <select id="sel-charge" class="ctrl-select" onchange="updateUI()">
        <option value="Total">Total Charges</option>
        <option value="Bounce">Bounce Only</option>
        <option value="Penal">Penal Only</option>
      </select>
      <div class="ctrl-divider"></div>
      <select id="sel-date" class="ctrl-select" onchange="updateUI()">
        <option value="Due Date">Due Date</option>
        <option value="Created Date">Created Date</option>
      </select>
      <div class="ctrl-divider"></div>
      <button id="theme-btn" class="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>
  </div>

  <!-- LOADER -->
  <div class="page-loader" id="loading">
    <div class="spinner"></div>
    <p class="loader-text">Aggregating Vintage Matrices...</p>
  </div>

  <!-- CONTENT -->
  <div id="content" class="hidden">

    <!-- KPI CARDS -->
    <div class="kpi-grid">

      <div class="glass-card kpi-card">
        <div class="kcard-accent" style="background:var(--indigo);"></div>
        <p class="kcard-label">Total Accrued</p>
        <p class="kcard-val" id="kpi-acc">--</p>
      </div>

      <div class="glass-card kpi-card">
        <div class="kcard-accent" style="background:var(--green);"></div>
        <p class="kcard-label" style="color:var(--green);">Total Collected</p>
        <p class="kcard-val" style="color:var(--green);" id="kpi-paid">--</p>
      </div>

      <div class="glass-card kpi-card">
        <div class="kcard-accent" style="background:var(--rose);"></div>
        <p class="kcard-label" style="color:var(--rose);">Total Remaining</p>
        <p class="kcard-val" style="color:var(--rose);" id="kpi-rem">--</p>
      </div>

      <div class="glass-card kpi-card">
        <div class="kcard-accent" style="background:var(--purple);"></div>
        <p class="kcard-label" style="color:var(--purple);">Overall Recovery</p>
        <p class="kcard-val" style="color:var(--purple);" id="kpi-rec">--</p>
      </div>
    </div>

    <!-- HEATMAP CARD -->
    <div class="glass-card hm-card">
      <div class="hm-toolbar">
        <h2 class="hm-title">Vintage Grid Matrix</h2>
        <div class="metric-selector">
          <button id="btn-remaining"   class="metric-btn active" onclick="setMetric('remaining')">Remaining</button>
          <button id="btn-accrued"     class="metric-btn" onclick="setMetric('accrued')">Accrued</button>
          <button id="btn-paid"        class="metric-btn" onclick="setMetric('paid')">Collected</button>
          <button id="btn-recoveryPct" class="metric-btn" onclick="setMetric('recoveryPct')">Recovery %</button>
        </div>
      </div>
      <div class="hm-scroll">
        <table class="hm-table">
          <thead>
            <tr>
              <th class="hm-th hm-th-left" style="width:160px;">DPD Bucket</th>
              <th class="hm-th">0-3 Months</th>
              <th class="hm-th">4-6 Months</th>
              <th class="hm-th">7-12 Months</th>
              <th class="hm-th">13-24 Months</th>
              <th class="hm-th">&ge; 25 Months</th>
              <th class="hm-th hm-th-total">Total</th>
            </tr>
          </thead>
          <tbody id="heatmap-body"></tbody>
        </table>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /shell -->

<!-- OVERLAY -->
<div id="overlay" class="overlay hidden" onclick="closeDrawer()"></div>

<!-- DRILLDOWN DRAWER -->
<div id="drawer" class="drawer translate-x-full">
  <div class="drawer-head">
    <div>
      <h3 class="drawer-title" id="drawer-title">Drilldown Analysis</h3>
      <p class="drawer-sub" id="drawer-subtitle">Loading...</p>
    </div>
    <div class="drawer-actions">
      <button onclick="exportCSV()" id="btn-csv" class="btn-csv hidden">Export CSV</button>
      <button onclick="closeDrawer()" class="btn-close">✕</button>
    </div>
  </div>
  <div class="drawer-body" id="drawer-content"></div>
</div>

<script>
// ── INIT THEME IMMEDIATELY (prevent FOUC) ───────────────────────────
(function() {
  const t = localStorage.getItem('vv-theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
})();

// ── STATE ──────────────────────────────────────────────────────────────
let db            = null;
let currentMetric = 'remaining';
let isDark        = (localStorage.getItem('vv-theme') || 'light') === 'dark';
let drilldownData = [];
let loadingTimer  = null;

// ── BOOT ───────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
});

// ── THEME ──────────────────────────────────────────────────────────────
function toggleTheme() {
  isDark = !isDark;
  const next = isDark ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('vv-theme', next);
  updateUI();
}

// ── DATA LOAD ──────────────────────────────────────────────────────────
google.script.run.withSuccessHandler(data => {
  db = data;
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');
  document.getElementById('header-date').innerText = 'Live Pipeline Data';
  updateUI();
}).getWebDashboardData();

// ── METRIC SELECTOR ─────────────────────────────────────────────────────
function setMetric(m) {
  currentMetric = m;
  ['remaining','accrued','paid','recoveryPct'].forEach(id => {
    document.getElementById('btn-' + id).classList.toggle('active', id === m);
  });
  updateUI();
}

// ── FORMATTERS ────────────────────────────────────────────────────────
const formatCr  = n => (n / 10000000).toFixed(2) + ' Cr';
const formatInt = n => new Intl.NumberFormat('en-IN').format(Math.round(n));

// ── CELL STYLE ────────────────────────────────────────────────────────
function getCellStyle(val, isTotalRow, isTotalCol) {
  if (isTotalRow || isTotalCol) {
    return isDark
      ? 'background:rgba(255,255,255,.07);color:rgba(241,245,249,.9);'
      : 'background:rgba(15,23,42,.06);color:#0F172A;';
  }
  if (val <= 0) {
    return isDark
      ? 'background:rgba(255,255,255,.03);color:rgba(100,116,139,.7);'
      : 'background:rgba(15,23,42,.03);color:rgba(148,163,184,.8);';
  }
  return '';
}

// ── MAIN RENDER ───────────────────────────────────────────────────────
function updateUI() {
  if (!db) return;
  const v = document.getElementById('sel-view').value;
  const d = document.getElementById('sel-date').value;
  const c = document.getElementById('sel-charge').value;
  const tableData = db[v][d][c];

  // Inject Non-Workable Total row dynamically
  const wt = tableData.find(r => r.name === 'Workable Total');
  const gt = tableData.find(r => r.name === 'Grand Total');
  if (wt && gt && !tableData.find(r => r.name === 'Non-Workable Total')) {
    const nwt = { name: 'Non-Workable Total', accrued: [], paid: [], remaining: [], recoveryPct: [] };
    for (let i = 0; i < 6; i++) {
      nwt.accrued[i]     = gt.accrued[i] - wt.accrued[i];
      nwt.paid[i]        = gt.paid[i] - wt.paid[i];
      nwt.remaining[i]   = gt.remaining[i] - wt.remaining[i];
      nwt.recoveryPct[i] = nwt.accrued[i] > 0 ? nwt.paid[i] / nwt.accrued[i] : 0;
    }
    tableData.splice(tableData.findIndex(r => r.name === 'Grand Total'), 0, nwt);
  }

  // KPI values from grand total
  const grandTot = tableData.find(r => r.name === 'Grand Total');
  if (grandTot) {
    document.getElementById('kpi-acc').innerText = '₹' + formatCr(grandTot.accrued[5]);
    document.getElementById('kpi-paid').innerText = '₹' + formatCr(grandTot.paid[5]);
    document.getElementById('kpi-rem').innerText = '₹' + formatCr(grandTot.remaining[5]);
    document.getElementById('kpi-rec').innerText = (grandTot.recoveryPct[5] * 100).toFixed(1) + '%';
  }

  // Max value for scale (excludes totals)
  let maxVal = 0;
  tableData.forEach(row => {
    if (!['Workable Total','Non-Workable Total','Grand Total'].includes(row.name)) {
      for (let i = 0; i < 5; i++) {
        if (row[currentMetric][i] > maxVal) maxVal = row[currentMetric][i];
      }
    }
  });

  const tbody = document.getElementById('heatmap-body');
  tbody.innerHTML = '';

  tableData.forEach(row => {
    const isWT = row.name === 'Workable Total';
    const isNWT = row.name === 'Non-Workable Total';
    const isGT = row.name === 'Grand Total';
    const isTotal = isWT || isNWT || isGT;

    let tr = `<tr><td class="hm-row-label${isTotal ? ' is-total' : ''}">${row.name}</td>`;

    for (let i = 0; i < 6; i++) {
      const val = row[currentMetric][i];
      const isTotalCol = (i === 5);
      let cellStyle = getCellStyle(val, isTotal, isTotalCol);

      // Coloured heat cells (non-total, non-zero)
      if (!isTotal && !isTotalCol && val > 0 && maxVal > 0) {
        const ratio = 0.12 + 0.88 * (val / maxVal);
        const textCol = ratio > 0.52 ? '#fff' : (isDark ? '#f1f5f9' : '#0f172a');
        if (currentMetric === 'remaining')   cellStyle = `background:rgba(225,29,72,${ratio});color:${textCol};`;
        else if (currentMetric === 'accrued') cellStyle = `background:rgba(79,70,229,${ratio});color:${textCol};`;
        else if (currentMetric === 'paid')    cellStyle = `background:rgba(16,185,129,${ratio});color:${textCol};`;
        else {
          const r = Math.min(val, 1);
          const tc = r > 0.52 ? '#fff' : (isDark ? '#f1f5f9' : '#0f172a');
          cellStyle = `background:rgba(139,92,246,${r});color:${tc};`;
        }
      }

      const displayVal = currentMetric === 'recoveryPct'
        ? (val * 100).toFixed(1) + '%'
        : formatInt(val);

      const action = val === 0 ? '' : `onclick="openDrilldown(this.dataset.bkt,parseInt(this.dataset.col))" data-bkt="${row.name}" data-col="${i}"`;
      tr += `<td class="hm-cell" style="${cellStyle}" ${action}>${displayVal}</td>`;
    }

    tr += `</tr>`;
    tbody.innerHTML += tr;

    if (isWT || isNWT) {
      tbody.innerHTML += `<tr><td colspan="7" style="height:6px;border:none;"></td></tr>`;
    }
  });
}

// ── DRILLDOWN ─────────────────────────────────────────────────────────
const vintageLabels = ['0-3 Months','4-6 Months','7-12 Months','13-24 Months','25+ Months','Overall Total'];

function openDrilldown(bucket, colIdx) {
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('drawer').classList.remove('translate-x-full');
  document.getElementById('btn-csv').classList.add('hidden');

  const v = document.getElementById('sel-view').value;
  const d = document.getElementById('sel-date').value;
  const c = document.getElementById('sel-charge').value;

  document.getElementById('drawer-title').innerText   = `${bucket} · ${vintageLabels[colIdx]}`;
  document.getElementById('drawer-subtitle').innerText = `Fetching ${c} charges · ${v === 'View 2' ? 'LMS' : 'FIFO'} Logic`;

  const content = document.getElementById('drawer-content');
  content.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;gap:1.25rem;animation:dlProgIn .3s ease;">
      <div style="position:relative;width:52px;height:52px;">
        <div style="position:absolute;inset:0;border-radius:50%;background:var(--indigo-light);animation:dlPing 1.6s ease-out infinite;"></div>
        <div style="position:relative;width:100%;height:100%;border-radius:50%;background:var(--indigo-light);border:1px solid var(--indigo-border);display:flex;align-items:center;justify-content:center;">
          <svg style="width:22px;height:22px;color:var(--indigo);animation:dlPulse 1.8s ease-in-out infinite;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
      </div>
      <div style="width:100%;max-width:260px;height:3px;background:var(--card-border2);border-radius:2px;overflow:hidden;">
        <div id="sim-progress" style="height:100%;background:var(--indigo);border-radius:2px;transition:width .3s ease;width:0%;box-shadow:0 0 8px var(--indigo);"></div>
      </div>
      <p id="loading-step" style="font-size:13px;font-weight:600;color:var(--text2);text-align:center;">Initializing query...</p>
      <p style="font-size:11px;color:var(--text3);font-family:var(--mono);">Processing 260k+ matrix rows</p>
    </div>`;

  if (loadingTimer) clearInterval(loadingTimer);

  let progress = 0;
  const steps = [
    'Fetching raw accrued data...',
    'Mapping historical payments...',
    'Executing in-memory matrix join...',
    'Calculating remaining balances...',
    'Sorting leads by highest outstanding...'
  ];
  loadingTimer = setInterval(() => {
    progress += (95 - progress) * 0.08;
    const bar = document.getElementById('sim-progress');
    const txt = document.getElementById('loading-step');
    if (bar) bar.style.width = progress + '%';
    if (txt) txt.innerText = steps[Math.min(Math.floor(progress / 20), steps.length - 1)];
  }, 400);

  google.script.run
    .withSuccessHandler(renderDrilldownTable)
    .withFailureHandler(err => {
      if (loadingTimer) clearInterval(loadingTimer);
      document.getElementById('drawer-content').innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;gap:1rem;text-align:center;">
          <div style="width:52px;height:52px;border-radius:50%;background:var(--red-light);border:1px solid var(--red-border);display:flex;align-items:center;justify-content:center;">
            <svg style="width:24px;height:24px;color:var(--red);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
          </div>
          <p style="font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.02em;">Query Timeout or Failure</p>
          <p style="font-size:12px;color:var(--text3);max-width:280px;line-height:1.6;">${err.message}</p>
          <button onclick="closeDrawer()" style="margin-top:8px;padding:7px 16px;background:var(--text);color:var(--bg);border-radius:8px;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;border:none;">Close Panel</button>
        </div>`;
    })
    .getVintageDrilldown(v, d, c, bucket, colIdx);
}

function closeDrawer() {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('drawer').classList.add('translate-x-full');
}

function renderDrilldownTable(data) {
  if (loadingTimer) clearInterval(loadingTimer);
  drilldownData = data;
  const content = document.getElementById('drawer-content');

  if (!data || data.length === 0) {
    content.innerHTML = `<p style="color:var(--text3);text-align:center;padding:3rem 1rem;font-size:13px;">No outstanding leads found for this combination.</p>`;
    return;
  }

  document.getElementById('drawer-subtitle').innerText = `${data.length} Leads · Sorted by Remaining (Desc)`;
  document.getElementById('btn-csv').classList.remove('hidden');

  let html = `<table class="dl-table">
    <thead class="dl-thead">
      <tr>
        <th class="dl-th">Lead ID</th>
        <th class="dl-th">Type</th>
        <th class="dl-th dl-th-r">Accrued</th>
        <th class="dl-th dl-th-r">Paid</th>
        <th class="dl-th dl-th-r">Remaining</th>
      </tr>
    </thead>
    <tbody>`;

  data.forEach(r => {
    html += `<tr class="dl-tr">
      <td class="dl-td dl-lead-id">${r.leadId}</td>
      <td class="dl-td dl-type">${r.loanType}</td>
      <td class="dl-td dl-accrued">₹${formatInt(r.accrued)}</td>
      <td class="dl-td dl-paid">₹${formatInt(r.paid)}</td>
      <td class="dl-td dl-rem">₹${formatInt(r.remaining)}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  content.innerHTML = html;
}

function exportCSV() {
  if (!drilldownData || drilldownData.length === 0) return;
  let csv = 'data:text/csv;charset=utf-8,Lead ID,Loan Type,Accrued,Paid,Remaining\n';
  drilldownData.forEach(r => { csv += `${r.leadId},${r.loanType},${r.accrued},${r.paid},${r.remaining}\n`; });
  const link = document.createElement('a');
  link.setAttribute('href', encodeURI(csv));
  link.setAttribute('download', 'Vintage_Drilldown.csv');
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>
</body>
</html>
